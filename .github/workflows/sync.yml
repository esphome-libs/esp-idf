name: Sync with upstream

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.ESPHOME_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.ESPHOME_GITHUB_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-workflows: write

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Sync branches and tags from upstream
        run: |
          git remote add upstream https://github.com/espressif/esp-idf.git
          git fetch upstream '+refs/heads/*:refs/remotes/upstream/*' '+refs/tags/*:refs/tags/*' --force
          git push origin '+refs/remotes/upstream/*:refs/heads/*' '+refs/tags/*:refs/tags/*' --force
          echo "✅ Sync complete"
