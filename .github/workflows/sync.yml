name: Sync with upstream

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Sync branches and tags from upstream
        run: |
          git remote add upstream https://github.com/espressif/esp-idf.git
          git fetch upstream '+refs/heads/*:refs/remotes/upstream/*' '+refs/tags/*:refs/tags/*' --force
          git push origin '+refs/remotes/upstream/*:refs/heads/*' '+refs/tags/*:refs/tags/*' --force
          echo "✅ Sync complete"

